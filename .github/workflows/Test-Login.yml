name: Add User to Azure Group

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  add-user:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Verify Login
        run: az account show